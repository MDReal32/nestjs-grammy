name: Release

on:
  # Auto-release: fires after the CI workflow finishes on master.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Manual release: lets you force a first release or pin an explicit version.
  workflow_dispatch:
    inputs:
      first-release:
        description: "First release (no prior version tags exist yet)"
        type: boolean
        default: false
      specifier:
        description: "Explicit version e.g. 1.0.0 (overrides conventional-commit bump). Leave empty to derive from commits."
        type: string
        default: ""

# Needed for: pushing the version commit + tags (contents) and npm provenance (id-token).
permissions:
  contents: write
  id-token: write

# Never run two releases at once; don't cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Manual dispatch always runs. Auto-release runs only when CI succeeded on master
    # and the triggering commit is NOT nx's own release commit (prevents an infinite loop).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !startsWith(github.event.workflow_run.head_commit.message, 'chore(release)'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          # Full history is required for conventional-commit version bumps and changelogs.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1 (Node 22 ships npm 10.x).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn nx run-many -t build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Auth is via OIDC trusted publishing (no token). Requires a trusted
      # publisher configured for each package on npmjs.com + id-token: write.
      #
      # Behaviour:
      #   - Manual dispatch with an explicit `specifier` -> release exactly that.
      #   - Otherwise (every push to master, or manual without a specifier):
      #     if the current manifest version isn't on npm yet, publish it as-is;
      #     if it already exists, patch-bump and publish. So every push deploys.
      - name: Release (version, changelog, tag, publish)
        run: |
          set -eo pipefail
          spec="${{ inputs.specifier }}"
          if [ -n "$spec" ]; then
            yarn nx release "$spec" ${{ inputs.first-release && '--first-release' || '' }} --yes
          else
            name=$(node -p "require('./packages/nestjs-grammy/package.json').name")
            ver=$(node -p "require('./packages/nestjs-grammy/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "::notice::$name@$ver already on npm — patch bump + publish"
              yarn nx release patch --yes
            else
              echo "::notice::$name@$ver not on npm — publishing current version"
              yarn nx release publish
            fi
          fi
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Push release commit and tags
        run: git push --follow-tags origin master
