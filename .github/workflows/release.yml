name: Release

on:
  # Auto-release: fires after the CI workflow finishes on master.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Manual release: lets you force a first release or pin an explicit version.
  workflow_dispatch:
    inputs:
      first-release:
        description: "First release (no prior version tags exist yet)"
        type: boolean
        default: false
      specifier:
        description: "Explicit version e.g. 1.0.0 (overrides conventional-commit bump). Leave empty to derive from commits."
        type: string
        default: ""

# Needed for: pushing the version commit + tags (contents) and npm provenance (id-token).
permissions:
  contents: write
  id-token: write

# Never run two releases at once; don't cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Manual dispatch always runs. Auto-release runs only when CI succeeded on master
    # and the triggering commit is NOT nx's own release commit (prevents an infinite loop).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !startsWith(github.event.workflow_run.head_commit.message, 'chore(release)'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          # Full history is required for conventional-commit version bumps and changelogs.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn nx run-many -t build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release (version, changelog, tag, publish)
        run: yarn nx release ${{ inputs.specifier }} ${{ inputs.first-release && '--first-release' || '' }} --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Push release commit and tags
        run: git push --follow-tags origin master
