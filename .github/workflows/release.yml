name: Release

on:
  workflow_dispatch:
    inputs:
      first-release:
        description: "First release (no prior version tags exist yet)"
        type: boolean
        default: false

# Needed for: pushing the version commit + tags (contents) and npm provenance (id-token).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history is required for conventional-commit version bumps and changelogs.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn nx run-many -t build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release (version, changelog, tag, publish)
        run: yarn nx release ${{ inputs.first-release && '--first-release' || '' }} --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
